<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .title { font: 700 26px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 10; ry: 10; }
      .label { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .arrow { stroke: #0d9488; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488" />
    </marker>
  </defs>

  <text x="40" y="45" class="title">Arquitectura objetivo de evolucion web</text>

  <rect class="box" x="60" y="120" width="260" height="70" />
  <text class="label" x="80" y="163">Frontend web educativo</text>

  <rect class="box" x="390" y="120" width="240" height="70" />
  <text class="label" x="420" y="163">API y casos de uso</text>

  <rect class="box" x="710" y="80" width="320" height="70" />
  <text class="label" x="735" y="123">Motor numerico desacoplado</text>

  <rect class="box" x="1050" y="80" width="140" height="70" />
  <text class="label" x="1062" y="123">Metodos</text>
  <text class="label" x="1059" y="146">y evaluadores</text>

  <rect class="box" x="710" y="180" width="320" height="70" />
  <text class="label" x="750" y="223">Analiticas y comparacion</text>

  <rect class="box" x="710" y="280" width="320" height="70" />
  <text class="label" x="785" y="323">Persistencia de datos</text>

  <rect class="box" x="710" y="380" width="320" height="70" />
  <text class="label" x="740" y="423">Tutor didactico y recomendador</text>

  <path class="arrow" d="M320 155 L390 155" />
  <path class="arrow" d="M630 155 L710 115" />
  <path class="arrow" d="M1030 115 L1050 115" />
  <path class="arrow" d="M630 155 L710 215" />
  <path class="arrow" d="M630 155 L710 315" />
  <path class="arrow" d="M630 155 L710 415" />
</svg>
