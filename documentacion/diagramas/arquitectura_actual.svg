  <rect class="box" x="390" y="120" width="290" height="70" />
  <text class="label" x="420" y="163">Casos de uso y orquestacion</text>

  <rect class="box" x="760" y="80" width="220" height="70" />
  <text class="label" x="810" y="123">Core numerico</text>

  <rect class="box" x="1000" y="80" width="170" height="70" />
  <text class="label" x="1020" y="123">Metodos numericos</text>

  <rect class="box" x="760" y="180" width="220" height="70" />
  <text class="label" x="785" y="223">Comparacion y metricas</text>

  <rect class="box" x="760" y="280" width="220" height="70" />
  <text class="label" x="770" y="323">Persistencia de sesiones</text>

  <rect class="box" x="760" y="380" width="260" height="70" />
  <text class="label" x="785" y="423">Base para capa didactica</text>

  <path class="arrow" d="M310 155 L390 155" />
  <path class="arrow" d="M680 155 L760 115" />
  <path class="arrow" d="M980 115 L1000 115" />
  <path class="arrow" d="M680 155 L760 215" />
  <path class="arrow" d="M680 155 L760 315" />
  <path class="arrow" d="M680 155 L760 415" />
</svg>
